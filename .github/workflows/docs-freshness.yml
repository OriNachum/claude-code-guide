name: Docs Freshness Check

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for existing docs-freshness issue or PR
        id: check-existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OPEN_ISSUES=$(gh issue list --label "docs-freshness" --state open --json number --jq 'length')
          OPEN_PRS=$(gh pr list --label "docs-freshness" --state open --json number --jq 'length')
          if [ "$OPEN_ISSUES" -gt 0 ] || [ "$OPEN_PRS" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Open docs-freshness issue or PR already exists — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure docs-freshness label exists
        if: steps.check-existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create docs-freshness --description "Automated docs freshness check" --color "0075ca" 2>/dev/null || true

      - name: Run Claude Code for docs freshness
        if: steps.check-existing.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model sonnet"
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": ["WebFetch", "WebSearch", "Bash(gh issue create:*)", "Bash(gh pr create:*)", "Bash(gh label:*)"]
              }
            }
          prompt: |
            You are a docs-freshness checker. Your job is to compare our reference docs
            against Anthropic's official Claude Code documentation and fix ONLY factual
            inaccuracies. Do NOT make stylistic changes or restructure content.

            ## Step 1: Read all reference docs

            Read every file in the `skills/ask/references/` subfolders:

            **Beginner** (`skills/ask/references/beginner/`):
            - built-ins.md
            - choosing-your-model.md
            - memory.md
            - setting-your-environment.md
            - starting-to-work.md

            **Intermediate** (`skills/ask/references/intermediate/`):
            - automating-your-workflows.md
            - best-practices.md
            - configuring-your-claude.md
            - github-actions.md
            - hooks.md
            - loop.md
            - marketplace.md
            - mcp.md
            - plugin-examples.md
            - plugins.md
            - skills.md

            **Expert** (`skills/ask/references/expert/`):
            - agent-sdk.md
            - hooks-http.md
            - ongoing-work.md
            - sub-agents.md
            - team-mode.md

            ## Step 2: Fetch official docs

            Use WebFetch to retrieve the following official Anthropic docs and compare
            them against our reference files:

            | Our file                                    | Official URLs to fetch                                                                  |
            |---------------------------------------------|-----------------------------------------------------------------------------------------|
            | beginner/setting-your-environment.md         | https://docs.anthropic.com/en/docs/claude-code/setup, https://docs.anthropic.com/en/docs/claude-code/settings, https://docs.anthropic.com/en/docs/claude-code/memory |
            | beginner/starting-to-work.md                 | https://docs.anthropic.com/en/docs/claude-code/permissions, https://docs.anthropic.com/en/docs/claude-code/interactive-mode |
            | beginner/choosing-your-model.md              | https://docs.anthropic.com/en/docs/claude-code/model-config, https://docs.anthropic.com/en/docs/claude-code/fast-mode |
            | beginner/built-ins.md                        | https://docs.anthropic.com/en/docs/claude-code/cli-reference, https://docs.anthropic.com/en/docs/claude-code/features-overview |
            | beginner/memory.md                           | https://docs.anthropic.com/en/docs/claude-code/memory |
            | intermediate/best-practices.md               | https://docs.anthropic.com/en/docs/claude-code/best-practices |
            | intermediate/automating-your-workflows.md    | https://docs.anthropic.com/en/docs/claude-code/hooks, https://docs.anthropic.com/en/docs/claude-code/skills, https://docs.anthropic.com/en/docs/claude-code/sub-agents |
            | intermediate/hooks.md                        | https://docs.anthropic.com/en/docs/claude-code/hooks, https://docs.anthropic.com/en/docs/claude-code/hooks-guide |
            | intermediate/skills.md                       | https://docs.anthropic.com/en/docs/claude-code/skills |
            | intermediate/plugins.md                      | https://docs.anthropic.com/en/docs/claude-code/plugins, https://docs.anthropic.com/en/docs/claude-code/plugins-reference, https://docs.anthropic.com/en/docs/claude-code/plugin-marketplaces |
            | intermediate/configuring-your-claude.md      | https://docs.anthropic.com/en/docs/claude-code/settings, https://docs.anthropic.com/en/docs/claude-code/memory |
            | intermediate/loop.md                         | https://docs.anthropic.com/en/docs/claude-code/scheduled-tasks |
            | intermediate/marketplace.md                  | https://docs.anthropic.com/en/docs/claude-code/plugin-marketplaces |
            | intermediate/plugin-examples.md              | https://docs.anthropic.com/en/docs/claude-code/plugins |
            | intermediate/mcp.md                          | https://docs.anthropic.com/en/docs/claude-code/mcp |
            | intermediate/github-actions.md               | https://docs.anthropic.com/en/docs/claude-code/github-actions |
            | expert/agent-sdk.md                          | https://docs.anthropic.com/en/docs/claude-code/sdk |
            | expert/sub-agents.md                         | https://docs.anthropic.com/en/docs/claude-code/sub-agents |
            | expert/team-mode.md                          | https://docs.anthropic.com/en/docs/claude-code/agent-teams |
            | expert/hooks-http.md                         | https://docs.anthropic.com/en/docs/claude-code/hooks |
            | expert/ongoing-work.md                       | https://docs.anthropic.com/en/docs/claude-code/scheduled-tasks |

            If a URL returns an error or 404, skip it and note it in the PR body.

            ## Step 3: Compare and fix

            Look for these types of inaccuracies:
            - Outdated model names or IDs
            - Changed CLI flags or commands
            - Incorrect descriptions of features or behavior
            - Missing important new features that are documented officially
            - Deprecated content that no longer exists
            - Wrong default values or configuration options

            ## Step 4: Enforce CLAUDE.md rules

            While editing, ensure these rules from CLAUDE.md are respected:
            1. Slash commands are a subset of Skills — never list them separately
            2. Three automation mechanisms only: Hooks, Skills, Sub Agents (Agent Teams are NOT a fourth)
            3. Worktrees are an isolation layer, not a coordination mechanism
            4. Agent Teams are experimental — always flagged with a warning
            5. IKEA analogy: Hooks = assembly events, Skills = packages with instruction sheets, Sub Agents = packages + a handyperson

            ## Step 5: Boundaries — do NOT do any of these

            - Do NOT touch SKILL.md, CLAUDE.md, README.md, or plugin.json (except version bump)
            - Do NOT add or remove reference files
            - Do NOT rewrite sections that are accurate but worded differently from official docs
            - Do NOT change navigation links at the top of reference files
            - Do NOT make stylistic or formatting-only changes
            - Do NOT modify or remove YAML front matter blocks at the top of reference files

            ## Step 6: Create a findings issue

            Always create a GitHub issue summarizing your findings, even if all docs
            are current (this serves as an audit trail).

            Use the Bash tool to create the issue with `gh issue create`:
            - Title: `docs-freshness: weekly check (YYYY-MM-DD)` (using today's date)
            - Label: `docs-freshness`
            - Body containing a table of ALL checked files:

              ## Docs Freshness Report — YYYY-MM-DD

              | File | Status | Details | Source |
              |------|--------|---------|--------|
              | choosing-your-model.md | OUTDATED | Model ID changed from X to Y | [model-config](url) |
              | memory.md | CURRENT | No issues found | |
              | ... | ... | ... | ... |

              ## URLs that returned errors
              (list any URLs that 404'd or failed, or "None")

              ## Summary
              - Files checked: N
              - Current: X
              - Outdated: Y
              - Skipped: Z (URL errors)

            ## Step 7: If changes are needed

            If any files are outdated:
            1. Bump the patch version in `.claude-plugin/plugin.json` (e.g. 1.1.0 → 1.1.1)
            2. Create a new branch named `docs-freshness/YYYY-MM-DD` (using today's date)
            3. Commit all changes
            4. Open a PR with:
               - Title: `docs: update reference docs for accuracy (YYYY-MM-DD)`
               - Label: `docs-freshness`
               - Body referencing the issue number from Step 6

            If all docs are current, do NOT create a PR or branch.
